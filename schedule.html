<!DOCTYPE html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="keywords"
        content="Summer Course '22, BEST Skopje, Board of European Students of Technology - Skopje, BEST , Academic Course 2026, BEST Summer Course Skopje, Skopje" />

    <link rel="shortcut icon" href="./images/favicon.ico" type="image/x-icon">
    <link href='https://fonts.googleapis.com/css?family=Montserrat' rel='stylesheet'>
    <link rel="stylesheet" href="./bootstrap/css/bootstrap.min.css">
    <link rel="stylesheet" href="./styles.css">

    <title>Schedule - BEST Course in Summer 2026</title>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="./js/bootstrap.min.js"></script>

    <script>
        $(document).ready(function () {
            $("#header").load("header.html", function () {
                var path = window.location.pathname;
                var page = path.split("/").pop().split(".html")[0];
                $("#" + page).addClass("active");
            });
            $("#footer").load("footer.html");
        });
    </script>
</head>

<body class="schedule">
    <header id="header"></header>

    <div class="container-fluid">
        <div class="pt-3 row justify-content-center">
            <h2 class="orange-text text-center">SCHEDULE</h2>
            <img class="divider-mark" alt="..." src="./images/divider.png">
        </div>
        <div class="my-2">
            <h6 class="text-center pb-2">*This schedule is subject to change. Changes, if necessary, will be announced.</h6>
        </div>

        <div class="row justify-content-center my-4">
            <div class="col-12 col-md-10 col-lg-8">
                <div class="calendar-shadow-wrapper" style="box-shadow: 8px 8px 0px #F77BB7; border: 2px solid #2C2E77; overflow: hidden; display: flex;">
                    <div class="ratio ratio-16x9"> 
                        <iframe src="https://embed.styledcalendar.com/#PJY8YqVcDgHeYetUf1l0" title="Styled Calendar" class="styled-calendar-container" style="width: 100%; border: none;" data-cy="calendar-embed-iframe"></iframe>
<script async type="module" src="https://embed.styledcalendar.com/assets/parent-window.js"></script>
                    </div>
                </div>
                <script async type="module" src="https://embed.styledcalendar.com/assets/parent-window.js"></script>
            </div>
        </div>
        </div>

    <footer id="footer"></footer>
</body>

</html>
