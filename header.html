<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BEST Skopje - Retro Header</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Russo+One&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="styles.css">
</head>
<body>
    
    <div class="nav-overlay" id="nav-overlay"></div>

    <header class="retro-header">
        
        <div class="logo-left">
            <a href="https://best.eu.org/courses/welcome.jsp">
                <img alt="BEST Courses" src="./images/BEST_Course_logo.svg" class="header-logo">
            </a>
        </div>

        <div class="hamburger" id="hamburger-icon">
            <span></span>
            <span></span>
            <span></span>
        </div>

        <nav class="retro-nav" id="nav-menu">
            <button class="nav-close-btn" id="nav-close">
        <span></span>
        <span></span>
        <span></span>
            </button>
            <ul class="retro-nav-links ">
                <li><a href="./index.html">Home</a></li>
                <li class="dropdown">
                    <a href="./organizers.html">Course</a>
                    <div class="dropdown-content">
                        <a href="./participants.html">Participants</a>
                        <a href="./organizers.html">Organizers</a>
                        <a href="./about.html">BEST Skopje</a>
                    </div>
                </li>
                <li><a href="./schedule.html">Schedule</a></li>
                <li><a href="./survival-guide.html">Survival Guide</a></li>
                <li class="dropdown">
                    <a href="./academic-partners.html">Partners</a>
                    <div class="dropdown-content">
                        <a href="./academic-partners.html">Academic Partners</a>
                        <a href="./annual-partners.html">Annual Partners</a>
                        <a href="./media-partners.html">Media Partners</a>  
                        <a href="./sponsors.html">Sponsors</a>
                    </div>
                </li>
            </ul>
        </nav>

        <div class="logo-right">
            <a href="https://best.org.mk/">
                <img alt="BEST Skopje Logo" src="./images/best-skopje-logo.png" class="header-logo">
            </a>
        </div>

        <div class="clouds-container">
            <img src="images/large-cloud.png" alt="" class="cloud cloud-1">
            <img src="images/small-cloud.png" alt="" class="cloud cloud-2">
            <img src="images/medium-cloud.png" alt="" class="cloud cloud-3">
        </div>

    </header>

    <script>
const hamburger = document.getElementById('hamburger-icon');
const nav = document.getElementById('nav-menu');
const overlay = document.getElementById('nav-overlay');
const closeBtn = document.getElementById('nav-close');

function openNav() {
    nav.classList.add('active');
    overlay.classList.add('active');
    hamburger.classList.add('active');
}

function closeNav() {
    nav.classList.remove('active');
    overlay.classList.remove('active');
    hamburger.classList.remove('active');
    document.querySelectorAll('.dropdown').forEach(d => d.classList.remove('open'));
}

hamburger.addEventListener('click', openNav);
closeBtn.addEventListener('click', closeNav);
overlay.addEventListener('click', closeNav);

document.querySelectorAll('.dropdown > a').forEach(function(link) {
    link.addEventListener('click', function(e) {
        if (window.innerWidth <= 992) {
            e.preventDefault();
            e.stopPropagation();
            
            const parent = this.parentElement;

            document.querySelectorAll('.dropdown').forEach(d => {
                if (d !== parent) d.classList.remove('open');
            });
            
            // Toggle current dropdown
            parent.classList.toggle('open');
        }
    });
});

document.querySelectorAll('.dropdown-content a').forEach(function(subLink) {
    subLink.addEventListener('click', function(e) {
        setTimeout(() => {
            closeNav();
        }, 150);
    });
});
</script>

</body>
</html>
