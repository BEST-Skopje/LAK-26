    <style>
        /* --- Background Setup with Layered Clouds --- */
        .pixel-bg-container {
            background-color: #83c6dd;
            min-height: 100vh;
            padding-bottom: 3rem;
            position: relative;
            
            background-image: 
                url('./images/medium-cloud.png'), 
                url('./images/medium-cloud.png'), 
                url('./images/medium-cloud.png'), 
                url('./images/medium-cloud.png');
            
            background-position: 
                12% 4%,    
                88% 15%,   
                5% 65%,    
                78% 85%;   
            
            background-size: 
                130px auto, 
                110px auto, 
                120px auto, 
                140px auto;
            
            background-repeat: no-repeat;
            image-rendering: pixelated; 
        }

        @media (min-width: 768px) {
            .pixel-bg-container {
                padding-bottom: 5rem;
                background-size: 170px auto, 140px auto, 150px auto, 180px auto;
                background-position: 12% 8%, 88% 22%, 5% 65%, 78% 78%;
            }
        }

        .page-header-title {
            display: none;
        }

        /* --- Mobile-First Retro OS Window Custom Styling --- */
        .retro-window {
            background-color: #fdf5e6;
            border: 2px solid #000;
            width: 100%;
            max-width: 290px; 
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            box-shadow: 5px 5px 0px rgba(0, 0, 0, 0.15);
            position: relative;
            z-index: 1;
        }

        @media (min-width: 576px) {
            .retro-window {
                max-width: 330px;
                box-shadow: 6px 6px 0px rgba(0, 0, 0, 0.15);
            }
        }

        /* Balanced Retro System Title Bar */
        .retro-titlebar {
            background-color: #a4cbf6;
            border-bottom: 2px solid #000;
            display: flex;
            justify-content: flex-end; /* Strictly forces all items to align flush right */
            align-items: center;
            height: 32px;
            padding: 0 6px;
        }

        @media (min-width: 576px) {
            .retro-titlebar {
                height: 34px;
                padding: 0 8px;
            }
        }

        /* Window Controls Box */
        .retro-controls {
            display: flex;
            gap: 2px;
            flex-shrink: 0;
            margin-left: auto; /* Absolute push safeguard for the right boundary edge */
        }

        /* Individual control buttons */
        .retro-btn {
            background: #fdf5e6;
            border: 2px solid #000;
            width: 16px;
            height: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 8px;
            font-weight: 900;
            font-family: monospace;
            padding: 0;
            cursor: pointer;
            line-height: 1;
            color: #000;
        }

        @media (min-width: 576px) {
            .retro-btn {
                width: 18px;
                height: 18px;
                font-size: 9px;
            }
        }
        
        .retro-btn:hover {
            background: #e6dfd3;
        }

        /* Outer Frame Wrapper Container */
        .retro-content-wrapper {
            background-color: #fdf5e6;
            padding: 6px;
            display: flex;
            flex-direction: column;
        }

        @media (min-width: 576px) {
            .retro-content-wrapper {
                padding: 10px;
            }
        }

        /* Inner Content Window Box */
        .retro-inner-frame {
            border: 2px solid #000;
            background-color: #fff;
            height: 140px; 
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }

        @media (min-width: 576px) {
            .retro-inner-frame {
                height: 180px;
                padding: 15px;
            }
        }

        .retro-inner-frame img {
            max-width: 90%;
            max-height: 100%;
            width: auto;
            height: auto;
            object-fit: contain;
        }

        /* Blue Accent Divider Block */
        .retro-divider {
            background-color: #a4cbf6;
            border-top: 2px solid #000;
            border-bottom: 2px solid #000;
            height: 14px;
            width: 100%;
        }

        @media (min-width: 576px) {
            .retro-divider {
                height: 18px;
            }
        }

        /* Footer Text Labels */
        .retro-footer {
            background-color: #fdf5e6;
            padding: 8px 6px;
            text-align: center;
        }

        @media (min-width: 576px) {
            .retro-footer {
                padding: 10px 8px;
            }
        }

        .retro-footer h5 {
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            font-size: 0.85rem;
            color: #000;
            margin: 0;
            letter-spacing: 0.3px;
        }

        @media (min-width: 576px) {
            .retro-footer h5 {
                font-size: 0.9rem;
                letter-spacing: 0.5px;
            }
        }

        /* Strict Alignment Layout Row Setup */
        .partner-row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            position: relative;
            z-index: 2;
        }

        .partner-col {
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>
